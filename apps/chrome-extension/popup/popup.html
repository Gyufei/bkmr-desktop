<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>添加到 bkmrx</title>
  <link rel="stylesheet" href="../lib/tagify.min.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app" x-data="popupApp">

    <!-- === Checking connection === -->
    <div x-show="checkingConnection" class="view-loading">
      <div class="spinner"></div>
      <p class="loading-text">连接中...</p>
    </div>

    <!-- === Disconnected === -->
    <template x-if="isDisconnected">
      <div class="view-disconnected">
        <svg class="disco-icon" width="64" height="64" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9" opacity=".4"/>
          <path d="M7 7l10 10"/>
          <path d="M7 17L17 7"/>
        </svg>
        <h2 class="disco-title">请连接 bkmrx</h2>
        <p class="disco-desc">确保后端应用已启动</p>
      </div>
    </template>

    <!-- === Connected === -->
    <template x-if="isConnected">
      <div class="view-connected" x-init="onConnected">
        <header class="app-header">
          <h1 class="app-title">添加到 bkmrx</h1>
        </header>

        <!-- Existing bookmark banner -->
        <div x-show="showBanner" class="existing-banner" x-text="bannerText"></div>

        <form @submit.prevent="submit" class="bookmark-form">
          <div class="field">
            <label for="url" class="field-label">
              <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              URL
            </label>
            <input type="url" id="url" x-model="form.url" required
                   placeholder="https://example.com" />
          </div>

          <div class="field">
            <label for="title" class="field-label">
              <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
              标题
            </label>
            <input type="text" id="title" x-model="form.title"
                   placeholder="页面标题" />
          </div>

          <div class="field">
            <label for="tags" class="field-label">
              <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg>
              标签
            </label>
            <input type="text" id="tags" x-ref="tagsInput"
                   placeholder="输入标签，回车添加，逗号分隔" />
          </div>

          <div class="field">
            <label for="description" class="field-label">
              <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              描述（可选）
            </label>
            <textarea id="description" x-model="form.description"
                      rows="2" placeholder="添加备注或描述"></textarea>
          </div>

          <button type="submit" id="submit-btn"
                  x-bind:disabled="submitting"
                  x-bind:class="submitBtnClass">
            <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
            <span class="btn-text" x-text="buttonText"></span>
          </button>

          <div x-show="errorMessage" class="status-message error" x-text="errorMessage" role="alert"></div>
          <div x-show="successMessage" class="status-message success" x-text="successMessage" role="status"></div>
        </form>
      </div>
    </template>

  </div>

  <script src="../lib/tagify.min.js"></script>
  <script src="../lib/alpine-csp.min.js" defer></script>
  <script src="popup.js"></script>
</body>
</html>
